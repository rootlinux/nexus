<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" width="1920" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="50%" stop-color="#12131a"/>
      <stop offset="100%" stop-color="#0d0e12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1a1d2e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#151822" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a3040" stop-opacity="1"/>
      <stop offset="40%" stop-color="#1a1d28" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d0e14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2235" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2a3050" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e2235" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#252840" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3a4060" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#3a4060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#252840" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="1920" height="480" fill="url(#bg)"/>
  <rect width="1920" height="480" fill="url(#glow1)"/>
  <rect width="1920" height="480" fill="url(#glow2)"/>

  <g opacity="0.15">
