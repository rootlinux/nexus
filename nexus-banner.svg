  <text x="960" y="455" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="300" letter-spacing="6" fill="#2a3050" text-anchor="middle" opacity="0.6">NEXUS</text>
