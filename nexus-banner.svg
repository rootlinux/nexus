    <circle cx="1200" cy="280" r="35" fill="#1a1d28"/>
    <circle cx="850" cy="320" r="25" fill="#1a1d28"/>
    <circle cx="1080" cy="180" r="30" fill="#1a1d28"/>
    <circle cx="1100" cy="340" r="20" fill="#1a1d28"/>
    <circle cx="780" cy="160" r="18" fill="#1a1d28"/>
    <circle cx="1150" cy="220" r="22" fill="#1a1d28"/>
