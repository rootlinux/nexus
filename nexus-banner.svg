    <line x1="960" y1="240" x2="1200" y2="280" stroke="url(#lineGrad)" stroke-width="0.8"/>
    <line x1="960" y1="240" x2="850" y2="320" stroke="url(#lineGrad)" stroke-width="0.8"/>
    <line x1="960" y1="240" x2="1080" y2="180" stroke="url(#lineGrad)" stroke-width="0.8"/>
    <line x1="960" y1="240" x2="1100" y2="340" stroke="url(#lineGrad)" stroke-width="0.6"/>
    <line x1="960" y1="240" x2="780" y2="160" stroke="url(#lineGrad)" stroke-width="0.6"/>
    <line x1="960" y1="240" x2="1150" y2="220" stroke="url(#lineGrad)" stroke-width="0.6"/>
    <line x1="720" y1="200" x2="780" y2="160" stroke="#1e2235" stroke-width="0.5" opacity="0.5"/>
    <line x1="720" y1="200" x2="850" y2="320" stroke="#1e2235" stroke-width="0.5" opacity="0.5"/>
    <line x1="1200" y1="280" x2="1080" y2="180" stroke="#1e2235" stroke-width="0.5" opacity="0.5"/>
    <line x1="1200" y1="280" x2="1150" y2="220" stroke="#1e2235" stroke-width="0.5" opacity="0.5"/>
    <line x1="1200" y1="280" x2="1100" y2="340" stroke="#1e2235" stroke-width="0.5" opacity="0.5"/>
