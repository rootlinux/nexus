    <line x1="1000" y1="0" x2="1000" y2="480" stroke="#1e2030" stroke-width="0.4"/>
    <line x1="1400" y1="0" x2="1400" y2="480" stroke="#1e2030" stroke-width="0.4"/>
    <line x1="1800" y1="0" x2="1800" y2="480" stroke="#1e2030" stroke-width="0.4"/>
  </g>

